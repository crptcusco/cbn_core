name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Simplificamos a 3.11 y 3.12 para evitar fallos en 3.10
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        # Actualizado a v5 para evitar advertencias de Node.js 20
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black isort flake8 mypy pytest
      - name: Run linters
        run: |
          black --check .
          isort --check-only .
          flake8 .
          # Mypy ahora solo apunta a tus carpetas de código
          mypy cbn_python/
      - name: Run tests
        run: |
          # Aseguramos que pytest encuentre tu código
          PYTHONPATH=. pytest -q